<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LiteMarkup Demo</title>
    <meta
      name="description"
      content="Try LiteMarkup live — a lightweight, AST-first markup language."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-a: #21857a;
        --brand-b: #c11f2e;
        --bg-primary: #ffffff;
        --bg-secondary: #f4f8f7;
        --bg-tertiary: #e8f0ee;
        --bg-editor: #f7fbfa;
        --bg-output: #f7fbfa;
        --text-primary: #122321;
        --text-secondary: #3d5753;
        --text-muted: #738e8a;
        --text-editor: #27413d;
        --accent: #21857a;
        --accent-hover: #1a6a61;
        --accent-light: #d7ebe7;
        --border: #d2e2df;
        --border-focus: #21857a;
        --success: #10b981;
        --code-bg: #edf5f3;
        --code-text: #1b6d64;
        --code-block-bg: #edf5f3;
        --code-block-text: #27413d;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --radius: 8px;
        --radius-lg: 12px;
      }

      [data-theme='dark'] {
        --bg-primary: #171c24;
        --bg-secondary: #11151c;
        --bg-tertiary: #242b36;
        --bg-editor: #131922;
        --bg-output: #131922;
        --text-primary: #ecf1f8;
        --text-secondary: #c0cad8;
        --text-muted: #7c8798;
        --text-editor: #dbe5f2;
        --accent: #4dc2b5;
        --accent-hover: #74d5ca;
        --accent-light: #22343b;
        --border: #323b48;
        --border-focus: #4dc2b5;
        --code-bg: #1a212b;
        --code-text: #8bd7cf;
        --code-block-bg: #1a212b;
        --code-block-text: #dbe5f2;
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: var(--bg-secondary);
        color: var(--text-primary);
        line-height: 1.5;
      }

      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 24px;
        background: var(--bg-primary);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
        color: var(--text-primary);
      }

      .logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
        border-radius: var(--radius);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 14px;
      }

      .logo-text {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .logo-text span {
        color: var(--text-muted);
        font-weight: 400;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .example-select {
        padding: 8px 12px;
        font-size: 13px;
        font-family: inherit;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text-primary);
        cursor: pointer;
        min-width: 160px;
        height: 36px;
      }

      .example-select:focus {
        outline: none;
        border-color: var(--border-focus);
      }

      .toggle-group {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: var(--bg-secondary);
        border-radius: var(--radius);
        font-size: 13px;
        color: var(--text-secondary);
        height: 36px;
      }

      .toggle-switch {
        position: relative;
        width: 36px;
        height: 20px;
      }

      .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--border);
        border-radius: 10px;
        transition: 0.2s;
      }

      .toggle-slider:before {
        position: absolute;
        content: '';
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }

      .toggle-switch input:checked + .toggle-slider {
        background: var(--accent);
      }

      .toggle-switch input:checked + .toggle-slider:before {
        transform: translateX(16px);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
        height: 36px;
        min-width: 36px;
      }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
      }

      .btn-ghost:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
      }

      .btn-icon {
        padding: 8px;
        justify-content: center;
      }

      .btn svg {
        width: 16px;
        height: 16px;
      }

      /* Main Content */
      .main {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 16px;
        gap: 16px;
      }

      .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: var(--bg-primary);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        min-width: 0;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        height: 48px;
      }

      .panel-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }

      .panel-tabs {
        display: flex;
        gap: 4px;
      }

      .tab-btn {
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        background: transparent;
        border: none;
        border-radius: 6px;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
      }

      .tab-btn:hover {
        background: var(--bg-tertiary);
        color: var(--text-secondary);
      }

      .tab-btn.active {
        background: var(--accent-light);
        color: var(--accent);
      }

      .panel-body {
        flex: 1;
        overflow: auto;
        position: relative;
      }

      /* Editor */
      .editor {
        width: 100%;
        height: 100%;
        padding: 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        line-height: 1.5;
        background: var(--bg-editor);
        color: var(--text-editor);
        border: none;
        outline: none;
        resize: none;
      }

      .editor::placeholder {
        color: var(--text-muted);
      }

      /* Output Views */
      .output-view {
        display: none;
        width: 100%;
        height: 100%;
        overflow: auto;
        background: var(--bg-output);
      }

      .output-view.active {
        display: block;
      }

      .html-preview {
        padding: 24px;
        font-size: 14px;
        line-height: 1.5;
      }

      .html-preview h1,
      .html-preview h2,
      .html-preview h3,
      .html-preview h4,
      .html-preview h5,
      .html-preview h6 {
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: 600;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }

      .html-preview h1:first-child,
      .html-preview h2:first-child,
      .html-preview h3:first-child {
        margin-top: 0;
      }

      .html-preview h1 {
        font-size: 2em;
      }
      .html-preview h2 {
        font-size: 1.5em;
      }
      .html-preview h3 {
        font-size: 1.25em;
      }
      .html-preview h4 {
        font-size: 1.1em;
      }
      .html-preview h5 {
        font-size: 1em;
      }
      .html-preview h6 {
        font-size: 0.9em;
        color: var(--text-secondary);
      }

      .html-preview p {
        margin: 0.5em 0;
      }

      .html-preview a {
        color: var(--accent);
        text-decoration: underline;
      }

      .html-preview code {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9em;
        background: var(--code-bg);
        color: var(--code-text);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .html-preview pre {
        background: var(--code-block-bg);
        color: var(--code-block-text);
        padding: 16px;
        border-radius: var(--radius);
        overflow-x: auto;
        margin: 1em 0;
        position: relative;
      }

      .html-preview pre code {
        background: transparent;
        color: inherit;
        padding: 0;
      }

      .html-preview pre code::before {
        content: attr(data-infotext);
        position: absolute;
        right: 0;
        top: 0;
        font-size: 10px;
        padding: 4px 8px;
        color: var(--text-muted);
      }

      .html-preview blockquote {
        border-left: 3px solid var(--accent);
        margin: 1em 0;
        padding: 0.5em 0 0.5em 1em;
        color: var(--text-secondary);
        background: var(--bg-secondary);
        border-radius: 0 var(--radius) var(--radius) 0;
      }

      .html-preview blockquote p {
        margin: 0.5em 0;
      }

      .html-preview ul,
      .html-preview ol {
        margin: 0;
        padding-left: 1.5em;
      }

      .html-preview li {
        margin: 0;
      }

      .html-preview table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        background: var(--bg-primary);
      }

      .html-preview thead {
        background: var(--bg-tertiary);
      }

      .html-preview th,
      .html-preview td {
        border: 1px solid var(--border);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }

      .html-preview th {
        font-weight: 600;
      }

      .html-preview hr {
        border: none;
        height: 2px;
        background: linear-gradient(90deg, var(--border), var(--accent), var(--border));
        margin: 2em 0;
        border-radius: 1px;
      }

      .html-preview img {
        max-width: 100%;
        border-radius: var(--radius);
      }

      .html-preview i {
        font-style: italic;
      }

      .html-preview b {
        font-weight: 600;
      }

      .code-view {
        padding: 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-all;
        color: var(--text-editor);
        min-height: 100%;
      }

      .ast-view {
        padding: 16px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        line-height: 1.3;
        white-space: pre-wrap;
        min-height: 100%;
      }

      .ast-key {
        color: var(--accent);
      }
      .ast-string {
        color: #10b981;
      }
      .ast-number {
        color: #f59e0b;
      }
      .ast-null {
        color: #94a3b8;
      }

      /* Footer */
      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        font-size: 12px;
        color: var(--text-muted);
        border-top: 1px solid var(--border);
        background: var(--bg-primary);
        flex-shrink: 0;
        gap: 16px;
      }

      .footer a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.15s;
      }

      .footer a:hover {
        color: var(--accent);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header {
          flex-wrap: wrap;
          gap: 12px;
          padding: 12px 16px;
        }

        .header-controls {
          width: 100%;
          flex-wrap: wrap;
        }

        .main {
          flex-direction: column;
          padding: 12px;
          gap: 12px;
        }

        .panel {
          min-height: 40vh;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-left">
          <a href="https://github.com/tuures/LiteMarkup" class="logo">
            <div class="logo-icon">LM</div>
            <div class="logo-text">LiteMarkup <span>Demo</span></div>
          </a>
        </div>
        <div class="header-controls">
          <select class="example-select" id="examples">
            <option value="">Load example...</option>
            <option value="basics">Basic Syntax</option>
            <option value="formatting">Text Formatting</option>
            <option value="lists">Lists</option>
            <option value="code">Code Blocks</option>
            <option value="links">Links &amp; Images</option>
            <option value="blockquotes">Blockquotes</option>
            <option value="tables">Tables</option>
            <option value="full">Full Demo</option>
            <option value="readme">GitHub repo README.md</option>
            <option value="syntax">Syntax Reference</option>
          </select>
          <div class="toggle-group">
            <span>Markdown mode</span>
            <label class="toggle-switch">
              <input type="checkbox" id="mdMode" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <button class="btn btn-ghost btn-icon" id="themeToggle" title="Toggle theme">
            <!-- Sun and moon icons from Heroicons (MIT License) -->
            <svg
              id="sunIcon"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
              />
            </svg>
            <svg
              id="moonIcon"
              style="display: none"
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"
              />
            </svg>
          </button>
          <a href="https://github.com/tuures/LiteMarkup" class="btn btn-ghost" target="_blank">
            <!-- GitHub logo from official logo pack: GitHub_Invertocat_Black.svg -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 98 96" fill="currentColor">
              <path
                d="M41.4395 69.3848C28.8066 67.8535 19.9062 58.7617 19.9062 46.9902C19.9062 42.2051 21.6289 37.0371 24.5 33.5918C23.2559 30.4336 23.4473 23.7344 24.8828 20.959C28.7109 20.4805 33.8789 22.4902 36.9414 25.2656C40.5781 24.1172 44.4062 23.543 49.0957 23.543C53.7852 23.543 57.6133 24.1172 61.0586 25.1699C64.0254 22.4902 69.2891 20.4805 73.1172 20.959C74.457 23.543 74.6484 30.2422 73.4043 33.4961C76.4668 37.1328 78.0937 42.0137 78.0937 46.9902C78.0937 58.7617 69.1934 67.6621 56.3691 69.2891C59.623 71.3945 61.8242 75.9883 61.8242 81.252L61.8242 91.2051C61.8242 94.0762 64.2168 95.7031 67.0879 94.5547C84.4102 87.9512 98 70.6289 98 49.1914C98 22.1074 75.9883 0 48.9043 0C21.8203 0 0 22.1074 0 49.1914C0 70.4375 13.4941 88.0469 31.6777 94.6504C34.2617 95.6074 36.75 93.8848 36.75 91.3008L36.75 83.6445C35.4102 84.2188 33.6875 84.6016 32.1562 84.6016C25.8398 84.6016 22.1074 81.1563 19.4277 74.7441C18.375 72.1602 17.2266 70.6289 15.0254 70.3418C13.877 70.2461 13.4941 69.7676 13.4941 69.1934C13.4941 68.0449 15.4082 67.1836 17.3223 67.1836C20.0977 67.1836 22.4902 68.9063 24.9785 72.4473C26.8926 75.2227 28.9023 76.4668 31.2949 76.4668C33.6875 76.4668 35.2187 75.6055 37.4199 73.4043C39.0469 71.7773 40.291 70.3418 41.4395 69.3848Z"

            </svg>
            GitHub
          </a>
        </div>
      </header>

      <main class="main">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Input</span>
          </div>
          <div class="panel-body">
            <textarea
              class="editor"
              id="editor"
              placeholder="Type your LiteMarkup here..."
              spellcheck="false"
            ></textarea>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">Output</span>
            <div class="panel-tabs">
              <button class="tab-btn active" data-view="preview">Preview</button>
              <button class="tab-btn" data-view="html">HTML</button>
              <button class="tab-btn" data-view="ast">AST</button>

            <div class="output-view html-preview active" id="previewView"></div>
            <div class="output-view code-view" id="htmlView"></div>

      <footer class="footer">
        <span>LiteMarkup — AST-first, lightweight markup</span>
        <a href="https://github.com/tuures/LiteMarkup/" target="_blank">GitHub</a>
        <a href="https://www.npmjs.com/package/litemarkup" target="_blank">NPM</a>
      </footer>
    </div>

    <script>
      // Examples
      let examples = {
        basics: `# Welcome to LiteMarkup

LiteMarkup: a tiny Markdown parser with an AST-first TypeScript API and no dependencies.

Another paragraph here.

## Subheading

LiteMarkup aims to support the most popular Markdown features while maintaining a small bundle size, good performance,\
and strong AST extensibility.

The parser outputs a JSON AST and supports transformation hooks that can be used to post-process the AST without\
additional tree traversal. This makes it possible to extend some features outside the core parser when needed. \
Performance is comparable to popular JavaScript-based implementations like commonmark, marked, and markdown-it.

A simple HTML string renderer is included for demonstration and simple use cases, but users are expected to bring their\
own renderer tailored to their specific use case and context, such as rendering to React, docx, or something else.

LiteMarkup is not the fastest, the smallest, or the most comprehensive parser available, but it aims to provide the\
best balance between those three aspects while also offering AST support. I wrote LiteMarkup because the existing\
parsers I found either only output HTML or had large bundle sizes. It worked for my use case, so I took some time to\
smooth out a few rough edges and turn it into something that could hopefully benefit others with similar needs.`,

        formatting: `# Text Formatting

*This text is bold*

_This text is italic_

~Strikethrough~

You can combine *bold and _italic_ together*.

Use \`inline code\` for code snippets.

Add a line break with backslash at the end:\\
Like this!`,

        lists: `# Lists

## Ordered List
1. First item
1. Second item
1. Third item
   * Nested unordered
   * Another nested item
1. Fourth item

## Unordered List
* Apple
* Banana
  1. Yellow
  1. Curved
* Cherry`,

        code: `# Code Blocks

Inline \`code\` looks like this.

\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`
}

console.log(greet('World'))
\`\`\`

\`\`\`python
def fibonacci(n):
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)
\`\`\``,

        links: `# Links & Images

Here's a [link to GitHub](https://github.com).

Images work too:

![LiteMarkup Logo](https://tuures.github.io/LiteMarkup/docs/logo-text.svg)

Links can be *styled* like [_this italic link_](https://example.com).`,

        blockquotes: `# Blockquotes

> This is a blockquote.
> It can span multiple lines.

Regular paragraph here.

> Another quote with *bold* and _italic_.
> Very nice!`,

        tables: `# Tables

A simple table:

| Feature          | Status |
|------------------|--------|
| Basic formatting | ✅     |
| Tables           | ✅     |
| Simple API       | ✅     |

Tables support *inline* formatting:

| Feature              | Example              |
|----------------------|----------------------|
| *Bold*               | *important*          |
| _Italic_             | _emphasis_           |

      // DOM elements
      const editor = document.getElementById('editor')
      const previewView = document.getElementById('previewView')
      const htmlView = document.getElementById('htmlView')
      const astView = document.getElementById('astView')
      const mdModeToggle = document.getElementById('mdMode')
      const themeToggle = document.getElementById('themeToggle')
      const sunIcon = document.getElementById('sunIcon')
      const moonIcon = document.getElementById('moonIcon')
      const exampleSelect = document.getElementById('examples')
      const tabBtns = document.querySelectorAll('.tab-btn')
      const outputViews = document.querySelectorAll('.output-view')

      // State
      let mdMode = false
      const loadingExamples = {}

      // Prefetch example files on page load
      const filesToFetch = {
        syntax: 'LiteMarkup-syntax.lm',
        readme: '../README.md',
      }

      Object.entries(filesToFetch).forEach(([key]) => {
        ensureExampleLoaded(key)
      })

      function ensureExampleLoaded(name) {
        if (examples[name]) return Promise.resolve(examples[name])

        const path = filesToFetch[name]
        if (!path) return Promise.resolve(null)

        if (!loadingExamples[name]) {
          loadingExamples[name] = fetch(path)
            .then(res => (res.ok ? res.text() : null))
            .then(text => {
              if (text) examples[name] = text
              return text
            })
            .catch(() => null)
            .finally(() => {
              delete loadingExamples[name]
            })
        }

        return loadingExamples[name]
      }

      // Load example content
      function loadExample(name) {
        mdMode = name === 'readme'
        mdModeToggle.checked = mdMode

        const content = examples[name]
        if (content) {
          editor.value = content
          updateViews()
          return
        }

        ensureExampleLoaded(name).then(loaded => {
          if (!loaded) return
          editor.value = loaded
          updateViews()
        })
      }

      // Theme
      function setTheme(dark) {
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : '')
        sunIcon.style.display = dark ? 'none' : 'block'
        moonIcon.style.display = dark ? 'block' : 'none'
        localStorage.setItem('theme', dark ? 'dark' : 'light')
      }

      // Initialize theme
      const savedTheme = localStorage.getItem('theme')
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
      setTheme(savedTheme === 'dark' || (savedTheme === null && prefersDark))

      themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark'
        setTheme(!isDark)
      })

      // Syntax highlight AST
      function highlightAST(obj, indent = 0) {
        const spaces = '  '.repeat(indent)

        if (obj === null) return '<span class="ast-null">null</span>'
        if (typeof obj === 'string') return `<span class="ast-string">"${escapeHtml(obj)}"</span>`
        if (typeof obj === 'number') return `<span class="ast-number">${obj}</span>`
        if (typeof obj === 'boolean') return `<span class="ast-number">${obj}</span>`

        if (Array.isArray(obj)) {
          if (obj.length === 0) return '[]'
          const items = obj.map(item => spaces + '  ' + highlightAST(item, indent + 1))
          return '[\n' + items.join(',\n') + '\n' + spaces + ']'
        }

        if (typeof obj === 'object') {
          const keys = Object.keys(obj)
          if (keys.length === 0) return '{}'
          const pairs = keys.map(
            key =>
              spaces +
              '  ' +
              `<span class="ast-key">"${key}"</span>: ` +
              highlightAST(obj[key], indent + 1),
          )
          return '{\n' + pairs.join(',\n') + '\n' + spaces + '}'
        }

        return String(obj)
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      // Sanitize URLs: only allow explicit http(s) URLs in rendered links and images
      const sanitizeUrl = url => (/^#|https?:\/\//i.test(url) ? url : '')

      // Update views
      let updateTimer = null
      function updateViews() {
        clearTimeout(updateTimer)
        updateTimer = setTimeout(() => {
          const value = editor.value
          const ast = litemarkup.parser({
            markdownMode: mdMode,
            transformBlock: node => {
              if (node.type === 'htm') return [{ type: 'p', body: [{ type: '', txt: node.raw }] }]
              return [node]
            },
            transformInline: node => {
              if (node.type === 'a') return [{ ...node, href: sanitizeUrl(node.href) }]
              if (node.type === 'img') return [{ ...node, src: sanitizeUrl(node.src) }]
              return [node]
            },
          })(value)
          const html = litemarkup.htmlRenderer({ allowUnsafeHtml: true })(ast)

          previewView.innerHTML = html
          previewView.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(el => {
            const slug = el.textContent
              .normalize()
              .toLowerCase()
              .replace(/[^a-z0-9 \p{L}-]/gu, '')
              .replace(/\s+|-+/g, '-')
              .replace(/^-|-$/g, '')
            el.id = slug
          })
          htmlView.textContent = html
          astView.innerHTML = highlightAST(ast)
        }, 100)
      }

      // Event listeners
      editor.addEventListener('input', updateViews)

      mdModeToggle.addEventListener('change', e => {
        mdMode = e.target.checked
        updateViews()
      })

      exampleSelect.addEventListener('change', e => {
        const value = e.target.value
        if (value) {
          loadExample(value)
          e.target.value = ''
        }
      })

      tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          tabBtns.forEach(b => b.classList.remove('active'))
          btn.classList.add('active')

          const view = btn.dataset.view
          outputViews.forEach(v => v.classList.remove('active'))
          document.getElementById(view + 'View').classList.add('active')
        })
      })

      // Initialize with default example
      loadExample('readme')
    </script>
  </body>
</html>
